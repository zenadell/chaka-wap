# fly.toml app configuration file
app = "chaka-wap-bot"
# Moved to iad (US-East): DeepSeek completions hang from lhr/London but work from iad.
primary_region = "iad"

[http_service]
  internal_port = 3000
  force_https = true
  # A WhatsApp bot must stay connected to receive messages and run the cron
  # scheduler. Keep at least one machine alive and do NOT auto-stop on idle.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "chaka_data"
  destination = "/app/data"

# 256MB OOM-killed Node mid-reply during the WhatsApp history-sync that fires on a
# fresh device link. 1GB gives comfortable headroom for history syncs + up to 4
# concurrent sessions. Pinned here so deploys never silently reset the machine size.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  ACTIVE_API = "deepseek"
  # Cap V8 heap below the container limit so GC kicks in before the kernel OOM-kills us.
  NODE_OPTIONS = "--max-old-space-size=768"
