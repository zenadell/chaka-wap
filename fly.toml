# fly.toml app configuration file
app = "chaka-wap"
primary_region = "lhr"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "chaka_data"
  destination = "/app/data"

[env]
  PORT = "3000"
  ACTIVE_API = "openrouter"
