<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaka - Vibe & Draft Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        base: '#0D0D0E', card: '#18181A', cardHover: '#2A2A2D',
                        brandOrange: '#FC5A38', brandOrangeHover: '#E04A2A',
                        textMuted: '#A1A1AA', borderMuted: '#333333'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0D0D0E; color: #FFFFFF; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4D4D4D; }
    </style>
</head>
<body class="h-screen w-screen flex antialiased bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-card via-base to-base">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-card border-r border-borderMuted p-6 flex flex-col shrink-0 hidden md:flex">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-8 h-8 rounded-full bg-brandOrange flex items-center justify-center shrink-0 shadow-lg shadow-brandOrange/20">
                <i class="fab fa-whatsapp text-white text-sm"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">Chaka<span class="text-brandOrange">Vibe</span></h1>
        </div>
        <nav class="space-y-2 flex-1">
            <a href="/index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-textMuted hover:text-white transition-colors">
                <i class="fas fa-arrow-left w-5"></i> Back to Main
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-brandOrange/10 text-brandOrange font-medium transition-colors">
                <i class="fas fa-pencil-ruler w-5"></i> Draft Console
            </a>
        </nav>
        <div class="pt-6 border-t border-borderMuted">
            <button onclick="toggleGlobalDraftMode()" id="draft-toggle-btn" class="flex items-center justify-center gap-2 w-full py-3 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 border border-red-500/30 transition-colors text-sm font-medium">
                <i class="fas fa-toggle-off"></i> Draft Mode: OFF
            </button>
            <p class="text-xs text-textMuted mt-3 text-center">When ON, AI will hold messages here for approval instead of sending them.</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-6 md:p-10 flex flex-col">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-3xl font-bold">Draft Approval Queue</h2>
                <p class="text-textMuted text-sm mt-1">Review AI-generated replies before they go out.</p>
            </div>
            <div class="bg-card px-4 py-2 border border-borderMuted rounded-full flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-xs font-medium tracking-widest uppercase text-textMuted" id="connection-status">Connecting...</span>
            </div>
        </header>

        <div id="drafts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-1 items-start content-start">
            <!-- Draft cards will appear here -->
            <div id="empty-state" class="col-span-full flex flex-col items-center justify-center py-20 text-textMuted">
                <i class="fas fa-inbox text-5xl mb-4 text-borderMuted"></i>
                <p class="text-lg">No pending drafts.</p>
                <p class="text-sm mt-1">Waiting for incoming messages...</p>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        // Draft mode is OPT-IN. Opening this page must NOT change whether replies auto-send.
        let draftModeEnabled = false;
        const socket = io({ auth: { token } });

        socket.on('connect', () => {
            document.getElementById('connection-status').textContent = 'Connected';
        });

        socket.on('disconnect', () => {
            document.getElementById('connection-status').textContent = 'Disconnected';
        });

        function toggleGlobalDraftMode() {
            draftModeEnabled = !draftModeEnabled;
            const btn = document.getElementById('draft-toggle-btn');
            
            socket.emit('toggle_draft_mode', { type: 'global', enabled: draftModeEnabled });
            
            if (draftModeEnabled) {
                btn.className = "flex items-center justify-center gap-2 w-full py-3 rounded-lg bg-green-500/10 text-green-400 hover:bg-green-500/20 border border-green-500/30 transition-colors text-sm font-medium";
                btn.innerHTML = '<i class="fas fa-toggle-on"></i> Draft Mode: ON';
            } else {
                btn.className = "flex items-center justify-center gap-2 w-full py-3 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 border border-red-500/30 transition-colors text-sm font-medium";
                btn.innerHTML = '<i class="fas fa-toggle-off"></i> Draft Mode: OFF';
            }
        }

        const draftsContainer = document.getElementById('drafts-container');
        const emptyState = document.getElementById('empty-state');
        let draftList = [];

        socket.on('new_draft', (data) => {
            console.log("New Draft:", data);
            emptyState.style.display = 'none';
            draftList.push(data);
            renderDrafts();
        });

        function approveDraft(index) {
            const draft = draftList[index];
            // Send the (possibly edited) text + the AI's original so the server can
            // learn from any changes the owner made before approving.
            const edited = (document.getElementById('draft-edit-' + index)?.value || draft.draftText).trim();
            if (!edited) return;
            socket.emit('approve_draft', { ...draft, draftText: edited, originalDraft: draft.draftText });
            removeDraft(index);
        }

        function rejectDraft(index) {
            removeDraft(index);
        }

        function removeDraft(index) {
            draftList.splice(index, 1);
            if (draftList.length === 0) emptyState.style.display = 'flex';
            renderDrafts();
        }

        function renderDrafts() {
            // Remove existing cards
            const existingCards = document.querySelectorAll('.draft-card');
            existingCards.forEach(c => c.remove());

            draftList.forEach((draft, idx) => {
                const card = document.createElement('div');
                card.className = "draft-card bg-card border border-brandOrange/30 rounded-2xl p-5 shadow-[0_0_15px_rgba(252,90,56,0.1)] flex flex-col gap-4 animate-fade-in";
                
                const timeAgo = new Date(draft.timestamp).toLocaleTimeString();

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-brandOrange/20 flex items-center justify-center text-brandOrange font-bold text-xs">
                                ${draft.contactName.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h4 class="font-bold text-sm text-white">${draft.contactName}</h4>
                                <span class="text-xs text-textMuted">${timeAgo}</span>
                            </div>
                        </div>
                        <span class="bg-brandOrange/20 text-brandOrange border border-brandOrange/30 text-[10px] px-2 py-0.5 rounded-md uppercase font-bold tracking-widest">Pending</span>
                    </div>

                    <div class="bg-black/30 p-3 rounded-xl border border-borderMuted/50 text-sm">
                        <p class="text-textMuted text-xs mb-1 uppercase font-semibold tracking-wider">User Sent:</p>
                        <p class="text-white">"${draft.originalMessage}"</p>
                    </div>

                    <div class="bg-brandOrange/5 p-3 rounded-xl border border-brandOrange/20 text-sm">
                        <p class="text-brandOrange text-xs mb-1 uppercase font-semibold tracking-wider">AI Proposes — edit freely, it learns from your changes:</p>
                        <textarea id="draft-edit-${idx}" rows="3"
                            class="w-full bg-black/30 border border-borderMuted/60 rounded-lg p-2.5 text-sm text-white resize-y outline-none focus:border-brandOrange/60"></textarea>
                    </div>

                    <div class="flex gap-3 mt-auto pt-2">
                        <button onclick="approveDraft(${idx})" class="flex-1 bg-brandOrange hover:bg-brandOrangeHover text-white py-2 rounded-xl text-sm font-bold transition-colors shadow-lg shadow-brandOrange/20">
                            Send
                        </button>
                        <button onclick="rejectDraft(${idx})" class="flex-1 bg-white/5 hover:bg-white/10 text-white py-2 rounded-xl text-sm font-bold transition-colors border border-white/10">
                            Discard
                        </button>
                    </div>
                `;
                draftsContainer.appendChild(card);
                // Set via .value (not innerHTML interpolation) so any characters in the
                // AI text can't break the markup.
                const ta = card.querySelector('textarea');
                if (ta) ta.value = draft.draftText;
            });
        }
    </script>
</body>
</html>
