<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set up your assistant · Chaka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        base: '#18181A', card: '#222224', cardHover: '#2A2A2D',
                        brandOrange: '#FC5A38', brandOrangeHover: '#E04A2A',
                        textMuted: '#A1A1AA', borderMuted: '#333333'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #18181A; color: #FFFFFF; }
        input, textarea { background-color: #18181A !important; border-color: #333333 !important; color: white !important; }
        input:focus, textarea:focus { border-color: #FC5A38 !important; outline: none !important; box-shadow: 0 0 0 1px #FC5A38 !important; }
        .type-card.selected { border-color: #FC5A38 !important; background-color: rgba(252,90,56,0.08) !important; }
        .tone-chip.selected { background-color: #FC5A38 !important; color: #fff !important; border-color: #FC5A38 !important; }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body class="min-h-screen w-screen flex flex-col items-center justify-center p-4 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-card via-base to-base">

    <div class="mb-6 text-center">
        <div class="w-14 h-14 bg-brandOrange/10 text-brandOrange rounded-2xl flex items-center justify-center text-2xl shadow-lg border border-brandOrange/20 mx-auto mb-3">
            <i class="fas fa-robot"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">Let's set up your assistant</h1>
        <p class="text-textMuted mt-1 text-sm">Tell us how you'll use Chaka so the AI replies the right way.</p>
    </div>

    <div class="w-full max-w-2xl bg-card/80 backdrop-blur-xl border border-borderMuted/50 rounded-2xl p-6 sm:p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brandOrange to-yellow-500"></div>

        <!-- Progress -->
        <div class="flex items-center gap-2 mb-6">
            <div id="bar1" class="h-1.5 flex-1 rounded-full bg-brandOrange transition-colors"></div>
            <div id="bar2" class="h-1.5 flex-1 rounded-full bg-borderMuted transition-colors"></div>
        </div>

        <div id="errorAlert" class="hidden mb-5 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-start gap-3">
            <i class="fas fa-exclamation-circle mt-0.5"></i>
            <span id="errorText"></span>
        </div>

        <!-- STEP 1: account type -->
        <div id="step1" class="step active">
            <h2 class="text-base font-semibold mb-1">What will you use Chaka for?</h2>
            <p class="text-textMuted text-xs mb-4">Pick the option that fits best — you can change this later.</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="typeGrid"></div>
            <div class="flex justify-end mt-6">
                <button id="toStep2" disabled class="px-5 py-2.5 rounded-xl bg-brandOrange text-white text-sm font-semibold hover:bg-brandOrangeHover transition disabled:opacity-40 disabled:cursor-not-allowed">
                    Continue <i class="fas fa-arrow-right ml-1"></i>
                </button>
            </div>
        </div>

        <!-- STEP 2: details -->
        <div id="step2" class="step">
            <h2 id="step2Title" class="text-base font-semibold mb-1">A few details</h2>
            <p class="text-textMuted text-xs mb-4">This shapes your assistant's voice and goals.</p>

            <div class="space-y-4">
                <div class="space-y-1">
                    <label id="nameLabel" class="text-[10px] text-textMuted font-medium uppercase tracking-wider pl-1">Name</label>
                    <input type="text" id="businessName" maxlength="120" class="w-full px-4 py-3 rounded-xl border border-borderMuted text-sm" />
                </div>

                <div class="space-y-1">
                    <label id="objectiveLabel" class="text-[10px] text-textMuted font-medium uppercase tracking-wider pl-1">What should it focus on?</label>
                    <textarea id="objective" rows="3" maxlength="500" class="w-full px-4 py-3 rounded-xl border border-borderMuted text-sm resize-none"></textarea>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] text-textMuted font-medium uppercase tracking-wider pl-1">Tone (optional)</label>
                    <div class="flex flex-wrap gap-2" id="toneChips"></div>
                </div>
            </div>

            <div class="flex justify-between items-center mt-6">
                <button id="backStep1" class="px-4 py-2.5 rounded-xl border border-borderMuted text-textMuted text-sm font-medium hover:text-white hover:border-white/40 transition">
                    <i class="fas fa-arrow-left mr-1"></i> Back
                </button>
                <button id="finishBtn" class="px-5 py-2.5 rounded-xl bg-brandOrange text-white text-sm font-semibold hover:bg-brandOrangeHover transition">
                    Finish setup <i class="fas fa-check ml-1"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        const TYPES = {
            business:   { icon: 'fa-store',        label: 'Business owner',     desc: 'Reply to customers, answer questions, take bookings.' },
            personal:   { icon: 'fa-face-smile',   label: 'Personal / fun',     desc: 'Casual auto-replies for personal chats.' },
            creator:    { icon: 'fa-star',         label: 'Creator / influencer', desc: 'Handle fan DMs and grow engagement.' },
            freelancer: { icon: 'fa-briefcase',    label: 'Freelancer / solo',  desc: 'Client comms, scheduling and follow-ups.' }
        };

        const COPY = {
            business:   { nameLabel: 'Business name', namePh: 'e.g. Bella\'s Bakery', objLabel: 'What should your assistant help customers with?', objPh: 'e.g. Answer menu & price questions, take orders, share opening hours.' },
            personal:   { nameLabel: 'Your name / nickname', namePh: 'e.g. Alex', objLabel: 'How should it sound when replying for you?', objPh: 'e.g. Chill and funny, keep my friends entertained when I\'m busy.' },
            creator:    { nameLabel: 'Creator / brand name', namePh: 'e.g. @alexcreates', objLabel: 'What should it do with your fans?', objPh: 'e.g. Thank supporters, answer content questions, push my latest drop.' },
            freelancer: { nameLabel: 'Your name or business', namePh: 'e.g. Alex Design Co.', objLabel: 'What client tasks should it handle?', objPh: 'e.g. Answer service questions, share availability, book discovery calls.' }
        };

        const TONES = ['Friendly', 'Professional', 'Playful', 'Concise', 'Warm'];

        let selectedType = null;
        let selectedTone = '';

        // Build type cards
        const grid = document.getElementById('typeGrid');
        Object.entries(TYPES).forEach(([key, t]) => {
            const el = document.createElement('button');
            el.type = 'button';
            el.className = 'type-card text-left p-4 rounded-xl border border-borderMuted bg-base hover:bg-cardHover transition flex gap-3 items-start';
            el.innerHTML = `
                <div class="w-9 h-9 shrink-0 rounded-lg bg-brandOrange/10 text-brandOrange flex items-center justify-center"><i class="fas ${t.icon}"></i></div>
                <div>
                    <div class="text-sm font-semibold">${t.label}</div>
                    <div class="text-xs text-textMuted mt-0.5">${t.desc}</div>
                </div>`;
            el.onclick = () => {
                selectedType = key;
                document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
                el.classList.add('selected');
                document.getElementById('toStep2').disabled = false;
            };
            grid.appendChild(el);
        });

        // Build tone chips
        const toneWrap = document.getElementById('toneChips');
        TONES.forEach(tone => {
            const chip = document.createElement('button');
            chip.type = 'button';
            chip.className = 'tone-chip px-3 py-1.5 rounded-full border border-borderMuted text-xs text-textMuted hover:text-white transition';
            chip.textContent = tone;
            chip.onclick = () => {
                if (selectedTone === tone) {
                    selectedTone = '';
                    chip.classList.remove('selected');
                } else {
                    selectedTone = tone;
                    document.querySelectorAll('.tone-chip').forEach(c => c.classList.remove('selected'));
                    chip.classList.add('selected');
                }
            };
            toneWrap.appendChild(chip);
        });

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorAlert').classList.remove('hidden');
        }
        function clearError() { document.getElementById('errorAlert').classList.add('hidden'); }

        function goStep(n) {
            document.getElementById('step1').classList.toggle('active', n === 1);
            document.getElementById('step2').classList.toggle('active', n === 2);
            document.getElementById('bar2').className = 'h-1.5 flex-1 rounded-full transition-colors ' + (n === 2 ? 'bg-brandOrange' : 'bg-borderMuted');
        }

        document.getElementById('toStep2').onclick = () => {
            if (!selectedType) return;
            const c = COPY[selectedType];
            document.getElementById('nameLabel').textContent = c.nameLabel;
            document.getElementById('businessName').placeholder = c.namePh;
            document.getElementById('objectiveLabel').textContent = c.objLabel;
            document.getElementById('objective').placeholder = c.objPh;
            document.getElementById('step2Title').textContent = TYPES[selectedType].label + ' — a few details';
            clearError();
            goStep(2);
        };
        document.getElementById('backStep1').onclick = () => goStep(1);

        document.getElementById('finishBtn').onclick = async (e) => {
            const btn = e.currentTarget;
            clearError();
            btn.disabled = true;
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            try {
                const res = await fetch('/api/onboarding', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({
                        account_type: selectedType,
                        business_name: document.getElementById('businessName').value,
                        objective: document.getElementById('objective').value,
                        tone: selectedTone
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/index.html';
                } else {
                    if (res.status === 401) { window.location.href = '/login.html'; return; }
                    showError(data.error || 'Something went wrong.');
                    btn.disabled = false;
                    btn.innerHTML = original;
                }
            } catch (err) {
                showError('Network error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = original;
            }
        };

        // If already onboarded, skip straight to the dashboard.
        fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.ok ? r.json() : null)
            .then(u => { if (u && u.onboarded) window.location.href = '/index.html'; })
            .catch(() => {});
    </script>
</body>
</html>
