<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaka Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        base: '#18181A', card: '#222224', cardHover: '#2A2A2D',
                        brandOrange: '#FC5A38', brandOrangeHover: '#E04A2A',
                        textMuted: '#A1A1AA', borderMuted: '#333333'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #18181A; color: #FFFFFF; }
        input { background-color: #18181A !important; border-color: #333333 !important; color: white !important; }
        input:focus { border-color: #FC5A38 !important; outline: none !important; box-shadow: 0 0 0 1px #FC5A38 !important; }
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #18181A inset !important;
            -webkit-text-fill-color: white !important;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-4 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-card via-base to-base">
    <div class="mb-8 text-center">
        <div class="w-16 h-16 bg-brandOrange/10 text-brandOrange rounded-2xl flex items-center justify-center text-3xl shadow-lg border border-brandOrange/20 mx-auto mb-4">
            <i class="fas fa-robot"></i>
        </div>
    </div>
    <div class="w-full max-w-md bg-card/80 backdrop-blur-xl border border-borderMuted/50 rounded-2xl p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brandOrange to-yellow-500"></div>
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight">Access Control</h1>
            <p class="text-textMuted mt-2 text-sm">Secure Identity Verification</p>
        </div>
        
        <!-- Error Alert -->
        <div id="errorAlert" class="hidden mb-6 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-start gap-3">
            <i class="fas fa-exclamation-circle mt-0.5"></i>
            <span id="errorText">Invalid credentials</span>
        </div>

        <form id="authForm" class="space-y-4">
            <div id="nameField" class="hidden space-y-1">
                <label class="text-[10px] text-textMuted font-medium uppercase tracking-wider pl-1">Display Name</label>
                <input type="text" id="name" class="w-full px-4 py-3 rounded-xl border border-borderMuted bg-base text-sm transition-colors focus:ring-1 focus:ring-brandOrange" placeholder="John Doe">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] text-textMuted font-medium uppercase tracking-wider pl-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-textMuted/50"></i>
                    </div>
                    <input type="email" id="email" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-borderMuted bg-base text-sm transition-colors focus:ring-1 focus:ring-brandOrange" placeholder="you@example.com">
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] text-textMuted font-medium uppercase tracking-wider pl-1 flex justify-between">
                    Password
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-textMuted/50"></i>
                    </div>
                    <input type="password" id="password" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-borderMuted bg-base text-sm transition-colors focus:ring-1 focus:ring-brandOrange" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" id="submitBtn" class="w-full mt-6 bg-brandOrange hover:bg-brandOrangeHover text-white font-medium py-3 px-4 rounded-xl transition-all shadow-lg shadow-brandOrange/10 flex items-center justify-center gap-2">
                Sign In <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </form>

        <div class="my-6 flex items-center justify-between opacity-50">
            <hr class="w-full border-borderMuted/50">
            <span class="px-3 text-[10px] text-textMuted uppercase font-semibold tracking-widest">Or</span>
            <hr class="w-full border-borderMuted/50">
        </div>

        <a href="/auth/google" class="w-full bg-white text-black hover:bg-gray-100 font-medium py-3 px-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-3">
            <svg class="h-4 w-4" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
        </a>

        <div class="mt-8 pt-6 border-t border-borderMuted/30 text-center">
            <p class="text-xs text-textMuted">
                <span id="toggleText">Don't have an account?</span> 
                <button id="toggleModeBtn" class="text-brandOrange hover:text-white transition-colors font-medium ml-1">Request access</button>
            </p>
        </div>
    </div>

    <script>
        let isLogin = true;
        const form = document.getElementById('authForm');
        const submitBtn = document.getElementById('submitBtn');
        const toggleBtn = document.getElementById('toggleModeBtn');
        const toggleText = document.getElementById('toggleText');
        const nameField = document.getElementById('nameField');
        const errorAlert = document.getElementById('errorAlert');
        const errorText = document.getElementById('errorText');

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            nameField.classList.toggle('hidden', isLogin);
            submitBtn.innerHTML = isLogin ? 'Sign In <i class="fas fa-arrow-right text-xs"></i>' : 'Create Account <i class="fas fa-user-plus text-xs"></i>';
            toggleText.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleBtn.textContent = isLogin ? "Request access" : "Sign in";
            errorAlert.classList.add('hidden');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('hidden');
            
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('name').value;

            const endpoint = isLogin ? '/api/login' : '/api/register';
            const payload = isLogin ? { email, password } : { email, password, displayName };

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    errorText.textContent = data.error || "Authentication failed";
                    errorAlert.classList.remove('hidden');
                }
            } catch (err) {
                errorText.textContent = "Network topology error. Cluster unreachable.";
                errorAlert.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHtml;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
